name: eval-gate

# Runs the Assevra scorers on every PR and push to main, and fails the build if
# the scorecard regresses. The deterministic dimensions (PII, task-completion)
# always run. The LLM-as-judge dimensions (grounding, safety) run only when an
# ANTHROPIC_API_KEY secret is present -- so forks without the secret still get a
# meaningful gate instead of a hard failure.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Empty on forks -> the judge dimensions are skipped, not failed.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Assevra (deterministic core + PII extra)
        run: |
          python -m pip install --upgrade pip
          # The 'pii' extra pulls in Presidio; the judge deps install only if a
          # key is configured (the judge is skipped without one anyway).
          pip install -e ".[pii]"
          python -m spacy download en_core_web_lg

      - name: Install judge deps (only when a key is configured)
        if: env.ANTHROPIC_API_KEY != ''
        run: pip install -e ".[judge]"

      - name: Run the Assevra scorecard (gates the build)
        # --gate makes the CLI exit non-zero when any scored dimension drops
        # below its threshold, failing the PR.
        run: python -m assevra run --dataset datasets/golden.jsonl --gate

      - name: Upload scorecard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard
          path: |
            scorecard.md
            scorecard.json
          if-no-files-found: warn
